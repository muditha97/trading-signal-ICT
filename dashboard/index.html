<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ICT Signal Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0e17;
      --surface: #111827;
      --border:  #1f2937;
      --text:    #e5e7eb;
      --muted:   #6b7280;
      --long:    #10b981;
      --short:   #ef4444;
      --wait:    #f59e0b;
      --accent:  #3b82f6;
      --mono:    'IBM Plex Mono', monospace;
      --sans:    'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; padding: 24px 16px; }
    .page { max-width: 960px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .header-left h1 { font-family: var(--mono); font-size: 18px; font-weight: 600; letter-spacing: 0.05em; }
    .header-left p { font-size: 12px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
    .btn-refresh { background: var(--accent); color: white; border: none; padding: 8px 18px; border-radius: 6px; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
    .btn-refresh:hover { opacity: 0.85; }
    .btn-refresh:disabled { opacity: 0.4; cursor: not-allowed; }
    .kz-banner { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-radius: 8px; margin-bottom: 24px; font-family: var(--mono); font-size: 13px; font-weight: 500; }
    .kz-banner.active   { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--long); }
    .kz-banner.inactive { background: rgba(107,114,128,0.1); border: 1px solid var(--border); color: var(--muted); }
    .kz-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .active  .kz-dot { background: var(--long);  box-shadow: 0 0 6px var(--long); }
    .inactive .kz-dot { background: var(--muted); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
    .card.sig-LONG::before  { background: var(--long); }
    .card.sig-SHORT::before { background: var(--short); }
    .card.sig-WAIT::before  { background: var(--wait); }
    .card.sig-loading::before { background: var(--border); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .instrument-name { font-family: var(--mono); font-size: 15px; font-weight: 600; }
    .live-price { font-family: var(--mono); font-size: 13px; color: var(--muted); margin-top: 3px; }
    .signal-badge { font-family: var(--mono); font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 4px; letter-spacing: 0.08em; }
    .badge-LONG    { background: rgba(16,185,129,0.15);  color: var(--long); }
    .badge-SHORT   { background: rgba(239,68,68,0.15);   color: var(--short); }
    .badge-WAIT    { background: rgba(245,158,11,0.15);  color: var(--wait); }
    .badge-loading { background: var(--border); color: var(--muted); }
    .confidence { font-family: var(--mono); font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-top: 6px; display: inline-block; }
    .conf-HIGH   { background: rgba(16,185,129,0.1); color: var(--long); }
    .conf-MEDIUM { background: rgba(59,130,246,0.1); color: var(--accent); }
    .conf-LOW    { background: rgba(245,158,11,0.1); color: var(--wait); }
    .conf-WAIT   { background: var(--border); color: var(--muted); }
    .reason { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; min-height: 40px; }
    .conditions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .condition { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); }
    .cond-icon { font-size: 13px; flex-shrink: 0; }
    .cond-label { font-size: 11px; color: var(--muted); font-family: var(--mono); }
    .cond-value { font-size: 11px; font-weight: 500; font-family: var(--mono); }
    .cond-ok  { color: var(--long); }
    .cond-no  { color: var(--short); }
    .levels-title { font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .levels { display: flex; flex-direction: column; gap: 6px; }
    .level-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: var(--bg); border-radius: 5px; }
    .level-label { font-size: 11px; color: var(--muted); font-family: var(--mono); }
    .level-value { font-family: var(--mono); font-size: 13px; font-weight: 500; }
    .level-entry { color: var(--accent); }
    .level-sl    { color: var(--short); }
    .level-tp    { color: var(--long); }
    .level-pips  { color: var(--muted); font-size: 11px; }
    .no-trade { font-family: var(--mono); font-size: 11px; color: var(--muted); padding: 10px; text-align: center; background: var(--bg); border-radius: 6px; }
    .footer { text-align: center; font-size: 11px; color: var(--muted); font-family: var(--mono); padding-top: 16px; border-top: 1px solid var(--border); }
    .skeleton { background: linear-gradient(90deg, var(--border) 25%, var(--surface) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 4px; height: 14px; margin: 6px 0; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 10px 14px; border-radius: 6px; font-size: 12px; font-family: var(--mono); margin-top: 8px; }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-left">
      <h1>ICT SIGNAL DASHBOARD</h1>
      <p id="last-updated">Not yet loaded</p>
    </div>
    <button class="btn-refresh" id="btn-refresh" onclick="loadAll()">↻ Refresh</button>
  </div>

  <div class="kz-banner inactive" id="kz-banner">
    <div class="kz-dot"></div>
    <span id="kz-text">Checking kill zone status...</span>
  </div>

  <div class="grid">
    <div id="card-GBPUSD" class="card sig-loading">
      <div class="skeleton"></div>
      <div class="skeleton" style="width:60%"></div>
      <div class="skeleton" style="width:80%; margin-top:12px"></div>
    </div>
    <div id="card-XAUUSD" class="card sig-loading">
      <div class="skeleton"></div>
      <div class="skeleton" style="width:60%"></div>
      <div class="skeleton" style="width:80%; margin-top:12px"></div>
    </div>
  </div>

  <div class="footer">
    Not financial advice. ICT signals are for educational purposes only. Always manage your own risk.
  </div>

</div>
<script>
  const API = 'https://trading-signal-ict.onrender.com';
  const INSTRUMENTS = ['GBPUSD', 'XAUUSD'];
  const DISPLAY_NAMES = { 'GBPUSD': 'GBP / USD', 'XAUUSD': 'XAU / USD (Gold)' };

  async function loadAll() {
    const btn = document.getElementById('btn-refresh');
    btn.disabled = true;
    btn.textContent = 'Loading...';
    try {
      const health = await fetchJSON('/health');
      updateKillZoneBanner(health);
      await Promise.all(INSTRUMENTS.map(inst => loadSignal(inst)));
      document.getElementById('last-updated').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
    } catch (err) {
      console.error('Failed to load:', err);
    }
    btn.disabled = false;
    btn.textContent = '↻ Refresh';
  }

  async function loadSignal(instrument) {
    const cardEl = document.getElementById('card-' + instrument);
    try {
      const data = await fetchJSON('/signal/' + instrument);
      cardEl.className = 'card sig-' + data.signal;
      cardEl.innerHTML = buildCard(instrument, data);
    } catch (err) {
      cardEl.className = 'card sig-WAIT';
      cardEl.innerHTML = `
        <div class="instrument-name">${DISPLAY_NAMES[instrument]}</div>
        <div class="error-msg">Could not load signal: ${err.message}</div>`;
    }
  }

  function buildCard(instrument, d) {
    const sig    = d.signal;
    const struct = d.structure;
    const fvg    = d.fvg;
    const sweep  = d.sweep;
    const kz     = d.kill_zone;
    const levels = d.trade_levels;
    const hasLevels = levels && levels.entry;

    const conditions = [
      { label: 'Kill Zone',  ok: kz.in_kill_zone,       value: kz.in_kill_zone ? kz.session : `NY ${kz.ny_hour}:00` },
      { label: 'Structure',  ok: struct.bias !== 'Ranging', value: struct.bias },
      { label: 'FVG',        ok: fvg.found,              value: fvg.found  ? `${fvg.fvg_low}–${fvg.fvg_high}` : 'None' },
      { label: 'Sweep',      ok: sweep.swept,            value: sweep.swept ? sweep.swept_level : 'None' },
    ];

    return `
      <div class="card-header">
        <div>
          <div class="instrument-name">${DISPLAY_NAMES[instrument]}</div>
          <div class="live-price">Current: ${struct.current_price}</div>
        </div>
        <div style="text-align:right">
          <div class="signal-badge badge-${sig}">${sig}</div>
          <div class="confidence conf-${d.confidence}">${d.confidence}</div>
        </div>
      </div>
      <div class="reason">${d.reason}</div>
      <div class="conditions">
        ${conditions.map(c => `
          <div class="condition">
            <span class="cond-icon">${c.ok ? '✓' : '✗'}</span>
            <div>
              <div class="cond-label">${c.label}</div>
              <div class="cond-value ${c.ok ? 'cond-ok' : 'cond-no'}">${c.value}</div>
            </div>
          </div>`).join('')}
      </div>
      ${hasLevels ? `
        <div class="levels-title">Trade Levels</div>
        <div class="levels">
          <div class="level-row"><span class="level-label">Entry</span><span class="level-value level-entry">${levels.entry}</span></div>
          <div class="level-row"><span class="level-label">Stop Loss</span><span class="level-value level-sl">${levels.stop_loss} <span class="level-pips">${levels.risk_pips} pips</span></span></div>
          <div class="level-row"><span class="level-label">Take Profit</span><span class="level-value level-tp">${levels.take_profit} <span class="level-pips">${levels.reward_pips} pips</span></span></div>
          <div class="level-row"><span class="level-label">R:R Ratio</span><span class="level-value" style="color:var(--accent)">${levels.rr_ratio}</span></div>
        </div>` : `<div class="no-trade">No trade levels — waiting for setup</div>`}
      <div style="margin-top:12px; font-size:10px; color:var(--muted); font-family:var(--mono)">Analysed: ${d.analysed_at}</div>`;
  }

  function updateKillZoneBanner(health) {
    const banner = document.getElementById('kz-banner');
    const text   = document.getElementById('kz-text');
    if (health.in_kill_zone) {
      banner.className = 'kz-banner active';
      text.textContent = `${health.active_session}  ·  NY time ${health.ny_hour}:00  ·  Trading window OPEN`;
    } else {
      banner.className = 'kz-banner inactive';
      text.textContent = `${health.active_session}  ·  NY time ${health.ny_hour}:00  ·  Next: London 02:00 / NY 07:00`;
    }
  }

  async function fetchJSON(path) {
    const res = await fetch(API + path);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${res.status}`);
    }
    return res.json();
  }

  loadAll();
</script>
</body>
</html>
